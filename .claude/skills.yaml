  excalidraw-diagram:
    version: "1.0"
    type: skill
    wraps: "~/.claude/skills/excalidraw-diagram/SKILL.md"
    description: "Generate Excalidraw diagrams"
    trigger:
      keywords: [excalidraw, 手绘图, 白板, 思维导图, mindmap]
      negative_keywords: [mermaid, 流程图]
      priority: 15
      hint: "使用 excalidraw-diagram 生成 Excalidraw 图表"

  doc-coauthoring:
    version: "1.0"
    type: skill
    wraps: "~/.claude/skills/doc-coauthoring/SKILL.md"
    description: "Structured workflow for co-authoring documentation"
    trigger:
      keywords: [写文档, 技术方案, proposal, RFC, 设计文档, spec, 协同写作]
      negative_keywords: [报告, PPT, 代码]
      priority: 15
      hint: "使用 doc-coauthoring 协同撰写文档"

  frontend-design:
    version: "1.0"
    type: skill
    wraps: "~/.claude/skills/frontend-design/SKILL.md"
    description: "Production-grade frontend interfaces"
    trigger:
      keywords: [前端, 网页, landing page, dashboard, React, 组件, UI设计, 界面]
      file_patterns: ["*.html", "*.tsx", "*.jsx"]
      negative_keywords: [后端, API, 数据库]
      priority: 15
      hint: "使用 frontend-design 创建前端界面"

  canvas-design:
