    contract:
      constraints:
        - id: valid_pdf
          type: format
          rule: "输出必须是有效的 .pdf 文件"
          severity: hard_fail
          enforcement: machine
          stability: core
          checker: format_checker
          params: {allowed: [".pdf"]}

  mermaid-visualizer:
    version: "1.0"
    type: skill
    wraps: "~/.claude/skills/mermaid-visualizer/SKILL.md"
    description: "Transform text into Mermaid diagrams"
    trigger:
      keywords: [mermaid, 流程图, flowchart, 架构图, 时序图, sequence diagram, 甘特图]
      negative_keywords: [excalidraw, canvas]
